{% extends "base.html" %}

{% block content %}
<section class="card">
    <h2>Добавить альбом</h2>

    {% if errors %}
        <ul class="errors">
            {% for error in errors %}
                <li>{{ error }}</li>
            {% endfor %}
        </ul>
    {% endif %}

    <form method="post" class="album-form">
        <label>
            Название альбома
            <input type="text" name="title" placeholder="Например: Thriller">
        </label>

        <label>
            Исполнитель
            <input type="text" name="artist" placeholder="Например: Michael Jackson">
        </label>

        <label>
            Год
            <input type="number" name="year" placeholder="1982">
        </label>

        <label>
            Оценка
            <input type="number" name="rating" min="1" max="10" placeholder="10">
        </label>

        <button type="submit">Сохранить</button>
    </form>
</section>
{% endblock %}
