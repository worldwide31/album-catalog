name: Build and publish Docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: worldwide31/album-catalog

jobs:
  build:
    name: Build immutable image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image tags
        id: meta
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_sha=${REGISTRY}/${IMAGE_NAME}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_build=${REGISTRY}/${IMAGE_NAME}:build-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${REGISTRY}/${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_sha }}
            ${{ steps.meta.outputs.image_build }}
            ${{ steps.meta.outputs.image_latest }}

      - name: Write release metadata
        shell: bash
        run: |
          {
            echo "## Docker image published"
            echo ""
            echo "- Commit: $GITHUB_SHA"
            echo "- Image by commit: ${{ steps.meta.outputs.image_sha }}"
            echo "- Image by build: ${{ steps.meta.outputs.image_build }}"
            echo "- Registry: GHCR"
          } >> "$GITHUB_STEP_SUMMARY"
