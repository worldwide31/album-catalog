services:
  app:
    build: .
    image: album-catalog:stateless
    environment:
      APP_NAME: "Каталог альбомов PostgreSQL"
      HOST: "0.0.0.0"
      PORT: "5000"
      FLASK_ENV: "production"
      SECRET_KEY: "compose-secret-example"
      DB_ENGINE: "postgresql"
      DB_HOST: "db"
      DB_PORT: "5432"
      DB_NAME: "albums_db"
      DB_USER: "albums_user"
      DB_PASSWORD: "albums_password"
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - album-network

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "albums_db"
      POSTGRES_USER: "albums_user"
      POSTGRES_PASSWORD: "albums_password"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - album-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U albums_user -d albums_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - album-network

volumes:
  postgres_data:

networks:
  album-network:
